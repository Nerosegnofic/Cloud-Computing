<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification History</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    h1 { margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>

  <h1>Notification History</h1>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Title</th>
        <th>Body</th>
        <th>Received At</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyAfg3PkxaCGymkLQynCh07VHRp9FHbcI60",
      authDomain:        "cloudcomputingproject-5deca.firebaseapp.com",
      databaseURL:       "https://cloudcomputingproject-5deca-default-rtdb.firebaseio.com",
      projectId:         "cloudcomputingproject-5deca",
      storageBucket:     "cloudcomputingproject-5deca.firebasestorage.app",
      messagingSenderId: "710751714437",
      appId:             "1:710751714437:web:74fbd69d1a705acc753dec",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("notifications").on("value", snapshot => {
      const tbody = document.getElementById("tableBody");
      const data = snapshot.val();

      if (!data) {
        tbody.innerHTML = "<tr><td colspan='4'>No notifications found.</td></tr>";
        return;
      }

      let rows = "";

      Object.entries(data).forEach(([username, messages]) => {
        Object.values(messages).forEach(msg => {
          const date = new Date(msg.receivedAt).toLocaleString();
          rows += `<tr>
            <td>${username}</td>
            <td>${msg.title}</td>
            <td>${msg.body}</td>
            <td>${date}</td>
          </tr>`;
        });
      });

      tbody.innerHTML = rows;
    });
  </script>
</body>
</html>
